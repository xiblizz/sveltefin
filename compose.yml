# docker compose up -d --build
# Builds the SvelteKit app (adapter-node, run by bun) and fronts it with nginx,
# which enforces the COOP/COEP headers the libmpv-wasm backend needs — see
# deploy/nginx.conf. Point pangolin at this host's port 8080 (it terminates TLS).
services:
    sveltefin:
        build: .
        container_name: sveltefin
        restart: unless-stopped
        env_file: .env # JELLYFIN_URL, SESSION_SECRET, SEERR_*, ENABLE_MPV_BACKEND, ORIGIN
        expose:
            - '3000'

    nginx:
        image: docker.io/library/nginx:stable-alpine
        container_name: sveltefin-nginx
        restart: unless-stopped
        ports:
            - '8080:80'
        volumes:
            - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - sveltefin

networks:
    default:
        name: sveltefin
        driver_opts:
            com.docker.network.bridge.name: br-sveltefin
