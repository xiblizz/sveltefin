# SvelteFin front nginx — owns the cross-origin-isolation headers that the
# libmpv-wasm backend needs (SharedArrayBuffer). TLS is terminated by pangolin
# in front of this server, so this listens on plain HTTP.
#
# COEP must differ by path: Firefox accepts `credentialless` on documents but
# hard-blocks dedicated worker *scripts* served with it, while `require-corp`
# on a worker is compatible with a credentialless document in every engine.
# Worker scripts live under /mpv/ (libmpv pthread workers boot from
# /mpv/libmpv.js) and /_app/immutable/workers/ (the cache-worker chunk).
# Everything else stays credentialless so cross-origin <img> (TMDB posters on
# /requests) keeps working without CORP headers.
map $uri $sveltefin_coep {
    ~^/(mpv/|_app/immutable/workers/)  "require-corp";
    default                            "credentialless";
}

# Poster/backdrop cache. Artwork bytes are identical for every user (the URL —
# item id + tag + size params — fully determines the response), so they can be
# cached across sessions. Lives in the container's tmpfs-ish /var/cache/nginx;
# losing it on recreate just means re-warming from Jellyfin.
proxy_cache_path /var/cache/nginx/sveltefin_images levels=1:2
                 keys_zone=sveltefin_images:10m max_size=1g inactive=30d
                 use_temp_path=off;

server {
    listen 80;
    server_name _;

    # Images only (whitelisted shape from src/lib/img.js). Security trade-off,
    # accepted deliberately: a cache HIT is served without the app validating
    # the session, so artwork could outlive a logout. Requiring the session
    # cookie to at least be PRESENT keeps anonymous scraping out; every MISS
    # still authenticates fully in the app (and non-200s are never cached).
    location ~ ^/api/media/Items/[^/]+/Images/ {
        if ($cookie_sf_session = "") { return 401; }

        proxy_pass http://sveltefin:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # proxy_buffering must stay ON here (nginx never caches unbuffered
        # responses) — images are small, unlike the video streams below.
        proxy_cache sveltefin_images;
        proxy_cache_key $uri$is_args$args;
        proxy_cache_valid 200 30d;
        # The app marks images `private` (cookie-authed route), which would
        # veto caching — ignore it for the cache decision; the header still
        # reaches the browser untouched for its own private cache.
        proxy_ignore_headers Cache-Control Expires Vary;
        add_header X-Cache-Status $upstream_cache_status;

        # add_header doesn't inherit from / once used in a location — re-own
        # the isolation headers here too.
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Cross-Origin-Embedder-Policy;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy $sveltefin_coep always;
    }

    location / {
        proxy_pass http://sveltefin:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # X-Forwarded-Proto / X-Forwarded-Host from pangolin pass through as-is.

        # Media proxy: stream ranged responses straight through instead of
        # spooling multi-GB video responses to disk.
        proxy_buffering off;
        proxy_request_buffering off;

        # This proxy is the single owner of the isolation headers: drop any
        # upstream copies (hooks.server.js sets them when ENABLE_MPV_BACKEND=1)
        # so they can never duplicate — a duplicated COEP value parses as
        # invalid and silently breaks crossOriginIsolated.
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Cross-Origin-Embedder-Policy;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy $sveltefin_coep always;
    }
}
